<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 10px;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  h1 {
    font-size: 1.6rem;
    margin-bottom: 8px;
    color: #e94560;
  }

  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .controls button {
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: bold;
    background: #16213e;
    color: #eee;
    border: 2px solid #0f3460;
    transition: background 0.2s;
  }

  .controls button:hover { background: #0f3460; }
  .controls button.active { background: #e94560; border-color: #e94560; }

  .info-bar {
    display: flex;
    gap: 15px;
    margin-bottom: 8px;
    font-size: 1rem;
    font-weight: bold;
    align-items: center;
  }

  .info-bar span { color: #e94560; }

  #flag-toggle {
    padding: 6px 14px;
    border: 2px solid #0f3460;
    border-radius: 6px;
    background: #16213e;
    color: #eee;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
  }

  #flag-toggle.active {
    background: #e94560;
    border-color: #e94560;
  }

  .zoom-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .zoom-controls button {
    width: 36px;
    height: 36px;
    border: 2px solid #0f3460;
    border-radius: 6px;
    background: #16213e;
    color: #eee;
    font-size: 1.2rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
  }

  .zoom-controls button:hover { background: #0f3460; }

  #zoom-level {
    font-size: 0.85rem;
    color: #aaa;
    align-self: center;
  }

  #message {
    font-size: 1.1rem;
    font-weight: bold;
    margin-bottom: 8px;
    height: 1.4em;
    text-align: center;
  }

  #board-wrapper {
    overflow: auto;
    max-width: 100%;
    max-height: calc(100dvh - 200px);
    -webkit-overflow-scrolling: touch;
  }

  #board {
    display: inline-grid;
    gap: 1px;
    background: #7a7a7a;
    padding: 3px;
    border-radius: 6px;
    touch-action: pan-x pan-y;
  }

  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    aspect-ratio: 1;
  }

  .cell.hidden {
    background: #c0c0c0;
    border-top: 3px solid #ffffff;
    border-left: 3px solid #ffffff;
    border-bottom: 3px solid #808080;
    border-right: 3px solid #808080;
    transition: all 0.08s ease-in;
  }

  .cell.hidden:hover {
    background: #d0d0d0;
    border-top: 3px solid #ffffff;
    border-left: 3px solid #ffffff;
    border-bottom: 3px solid #888888;
    border-right: 3px solid #888888;
  }

  .cell.hidden:active, .cell.hidden.pressing {
    background: #b0b0b0;
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-bottom: 2px solid #d0d0d0;
    border-right: 2px solid #d0d0d0;
  }

  .cell.revealed {
    background: #d6d6d6;
    border: 1px solid #a0a0a0;
    cursor: default;
  }

  .cell.flagged {
    background: #c0c0c0;
    border-top: 3px solid #ffffff;
    border-left: 3px solid #ffffff;
    border-bottom: 3px solid #808080;
    border-right: 3px solid #808080;
  }

  .cell.mine {
    background: #e94560;
    border: 1px solid #a0a0a0;
  }

  .cell .n1 { color: #0000ff; }
  .cell .n2 { color: #008000; }
  .cell .n3 { color: #ff0000; }
  .cell .n4 { color: #000080; }
  .cell .n5 { color: #800000; }
  .cell .n6 { color: #008080; }
  .cell .n7 { color: #000000; }
  .cell .n8 { color: #808080; }
</style>
</head>
<body>

<h1>Minesweeper</h1>

<div class="controls">
  <button onclick="startGame(9, 9, 10)" id="btn-easy">Easy (9x9)</button>
  <button onclick="startGame(16, 16, 40)" id="btn-medium">Medium (16x16)</button>
  <button onclick="startGame(16, 30, 99)" id="btn-hard">Hard (30x16)</button>
</div>

<div class="info-bar">
  Mines: <span id="mine-count">0</span>
  <button id="flag-toggle" onclick="toggleFlagMode()">Flag: OFF</button>
  Time: <span id="timer">0</span>s
</div>

<div class="zoom-controls">
  <button onclick="zoomOut()">-</button>
  <span id="zoom-level">100%</span>
  <button onclick="zoomIn()">+</button>
</div>

<div id="message"></div>
<div id="board-wrapper">
  <div id="board"></div>
</div>

<script>
let rows, cols, totalMines;
let board;
let revealed;
let flagged;
let gameOver;
let firstClick;
let minesLeft;
let timerInterval;
let seconds;
let flagMode = false;
let longPressTimer = null;
let zoomFactor = 1.0;

function toggleFlagMode() {
  flagMode = !flagMode;
  const btn = document.getElementById('flag-toggle');
  btn.textContent = flagMode ? 'Flag: ON' : 'Flag: OFF';
  btn.classList.toggle('active', flagMode);
}

function zoomIn() {
  zoomFactor = Math.min(2.0, zoomFactor + 0.15);
  applyZoom();
}

function zoomOut() {
  zoomFactor = Math.max(0.4, zoomFactor - 0.15);
  applyZoom();
}

function applyZoom() {
  document.getElementById('zoom-level').textContent = Math.round(zoomFactor * 100) + '%';
  renderBoard();
}

function getBaseCellSize() {
  const maxWidth = window.innerWidth - 26;
  const maxHeight = window.innerHeight - 220;
  const cellW = Math.floor((maxWidth - (cols - 1)) / cols);
  const cellH = Math.floor((maxHeight - (rows - 1)) / rows);
  return Math.max(16, Math.min(36, cellW, cellH));
}

function startGame(r, c, mines) {
  rows = r;
  cols = c;
  totalMines = mines;
  board = [];
  revealed = [];
  flagged = [];
  gameOver = false;
  firstClick = true;
  minesLeft = mines;
  seconds = 0;
  zoomFactor = 1.0;
  document.getElementById('zoom-level').textContent = '100%';

  clearInterval(timerInterval);
  document.getElementById('timer').textContent = '0';
  document.getElementById('mine-count').textContent = minesLeft;
  document.getElementById('message').textContent = '';

  document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
  if (r === 9) document.getElementById('btn-easy').classList.add('active');
  else if (mines === 40) document.getElementById('btn-medium').classList.add('active');
  else document.getElementById('btn-hard').classList.add('active');

  for (let i = 0; i < rows; i++) {
    board[i] = [];
    revealed[i] = [];
    flagged[i] = [];
    for (let j = 0; j < cols; j++) {
      board[i][j] = 0;
      revealed[i][j] = false;
      flagged[i][j] = false;
    }
  }

  renderBoard();
}

function placeMines(safeRow, safeCol) {
  let placed = 0;
  while (placed < totalMines) {
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    if (board[r][c] === -1) continue;
    if (Math.abs(r - safeRow) <= 1 && Math.abs(c - safeCol) <= 1) continue;
    board[r][c] = -1;
    placed++;
  }

  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      if (board[i][j] === -1) continue;
      let count = 0;
      for (let di = -1; di <= 1; di++) {
        for (let dj = -1; dj <= 1; dj++) {
          const ni = i + di, nj = j + dj;
          if (ni >= 0 && ni < rows && nj >= 0 && nj < cols && board[ni][nj] === -1) {
            count++;
          }
        }
      }
      board[i][j] = count;
    }
  }
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  const baseSize = getBaseCellSize();
  const cellSize = Math.max(12, Math.round(baseSize * zoomFactor));
  const fontSize = Math.max(8, Math.floor(cellSize * 0.45));
  const borderW = Math.max(1, Math.round(cellSize * 0.08));

  boardEl.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
  boardEl.innerHTML = '';

  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      const cell = document.createElement('div');
      cell.style.width = cellSize + 'px';
      cell.style.height = cellSize + 'px';
      cell.style.fontSize = fontSize + 'px';
      cell.style.setProperty('--bw', borderW + 'px');
      cell.dataset.row = i;
      cell.dataset.col = j;

      // Restore state for already-revealed/flagged cells
      if (revealed[i][j]) {
        cell.className = 'cell revealed';
        if (board[i][j] === -1) {
          cell.classList.add('mine');
          cell.textContent = '\u{1F4A3}';
        } else if (board[i][j] > 0) {
          const span = document.createElement('span');
          span.className = `n${board[i][j]}`;
          span.textContent = board[i][j];
          cell.appendChild(span);
        }
      } else if (flagged[i][j]) {
        cell.className = 'cell hidden flagged';
        cell.textContent = '\u{1F6A9}';
      } else {
        cell.className = 'cell hidden';
      }

      // Desktop: click to reveal, right-click to flag
      cell.addEventListener('click', (e) => {
        if (flagMode) {
          handleRightClick(i, j);
        } else {
          handleClick(i, j);
        }
      });
      cell.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        handleRightClick(i, j);
      });

      // Mobile: long press to flag, with press animation
      cell.addEventListener('touchstart', (e) => {
        cell.classList.add('pressing');
        longPressTimer = setTimeout(() => {
          longPressTimer = null;
          handleRightClick(i, j);
          cell.dataset.longPressed = 'true';
          cell.classList.remove('pressing');
        }, 400);
      }, { passive: true });

      cell.addEventListener('touchend', (e) => {
        cell.classList.remove('pressing');
        if (longPressTimer) {
          clearTimeout(longPressTimer);
          longPressTimer = null;
        }
        if (cell.dataset.longPressed === 'true') {
          e.preventDefault();
          cell.dataset.longPressed = 'false';
        }
      });

      cell.addEventListener('touchmove', () => {
        cell.classList.remove('pressing');
        if (longPressTimer) {
          clearTimeout(longPressTimer);
          longPressTimer = null;
        }
      }, { passive: true });

      boardEl.appendChild(cell);
    }
  }
}

function getCell(r, c) {
  return document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
}

function handleClick(r, c) {
  if (gameOver || flagged[r][c] || revealed[r][c]) return;

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById('timer').textContent = seconds;
    }, 1000);
  }

  if (board[r][c] === -1) {
    revealAll();
    gameOver = true;
    clearInterval(timerInterval);
    document.getElementById('message').textContent = 'Game Over! Pick a difficulty to retry.';
    return;
  }

  reveal(r, c);
  checkWin();
}

function handleRightClick(r, c) {
  if (gameOver || revealed[r][c]) return;

  flagged[r][c] = !flagged[r][c];
  const cell = getCell(r, c);

  if (flagged[r][c]) {
    cell.textContent = '\u{1F6A9}';
    cell.classList.add('flagged');
    minesLeft--;
  } else {
    cell.textContent = '';
    cell.classList.remove('flagged');
    minesLeft++;
  }

  document.getElementById('mine-count').textContent = minesLeft;
}

function reveal(r, c) {
  if (r < 0 || r >= rows || c < 0 || c >= cols) return;
  if (revealed[r][c] || flagged[r][c]) return;

  revealed[r][c] = true;
  const cell = getCell(r, c);
  cell.classList.remove('hidden');
  cell.classList.add('revealed');

  const val = board[r][c];
  if (val > 0) {
    const span = document.createElement('span');
    span.className = `n${val}`;
    span.textContent = val;
    cell.appendChild(span);
  } else if (val === 0) {
    for (let di = -1; di <= 1; di++) {
      for (let dj = -1; dj <= 1; dj++) {
        reveal(r + di, c + dj);
      }
    }
  }
}

function revealAll() {
  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      const cell = getCell(i, j);
      if (board[i][j] === -1) {
        cell.classList.remove('hidden');
        cell.classList.add('mine');
        cell.textContent = '\u{1F4A3}';
      } else if (!revealed[i][j]) {
        revealed[i][j] = true;
        cell.classList.remove('hidden');
        cell.classList.add('revealed');
        if (board[i][j] > 0) {
          const span = document.createElement('span');
          span.className = `n${board[i][j]}`;
          span.textContent = board[i][j];
          cell.appendChild(span);
        }
      }
    }
  }
}

function checkWin() {
  let safeCount = 0;
  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      if (revealed[i][j]) safeCount++;
    }
  }
  if (safeCount === rows * cols - totalMines) {
    gameOver = true;
    clearInterval(timerInterval);
    document.getElementById('message').textContent =
      `You win! Completed in ${seconds}s`;
    for (let i = 0; i < rows; i++) {
      for (let j = 0; j < cols; j++) {
        if (board[i][j] === -1 && !flagged[i][j]) {
          flagged[i][j] = true;
          getCell(i, j).textContent = '\u{1F6A9}';
        }
      }
    }
    document.getElementById('mine-count').textContent = 0;
  }
}

// Resize board when orientation changes
window.addEventListener('resize', () => {
  if (!gameOver || firstClick) renderBoard();
});

// Start with easy mode
startGame(9, 9, 10);
</script>
</body>
</html>
