<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  h1 {
    font-size: 2rem;
    margin-bottom: 10px;
    color: #e94560;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .controls button {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: bold;
    background: #16213e;
    color: #eee;
    border: 2px solid #0f3460;
    transition: background 0.2s;
  }

  .controls button:hover { background: #0f3460; }
  .controls button.active { background: #e94560; border-color: #e94560; }

  .info-bar {
    display: flex;
    gap: 30px;
    margin-bottom: 15px;
    font-size: 1.2rem;
    font-weight: bold;
  }

  .info-bar span { color: #e94560; }

  #message {
    font-size: 1.4rem;
    font-weight: bold;
    margin-bottom: 10px;
    height: 1.6em;
  }

  #board {
    display: inline-grid;
    gap: 2px;
    background: #0f3460;
    padding: 4px;
    border-radius: 8px;
  }

  .cell {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }

  .cell.hidden {
    background: #16213e;
  }

  .cell.hidden:hover {
    background: #1a2a50;
  }

  .cell.revealed {
    background: #0a1628;
    cursor: default;
  }

  .cell.flagged {
    background: #16213e;
  }

  .cell.mine {
    background: #e94560;
  }

  .cell .n1 { color: #4fc3f7; }
  .cell .n2 { color: #81c784; }
  .cell .n3 { color: #e57373; }
  .cell .n4 { color: #7c4dff; }
  .cell .n5 { color: #ff8a65; }
  .cell .n6 { color: #4dd0e1; }
  .cell .n7 { color: #f48fb1; }
  .cell .n8 { color: #ccc; }
</style>
</head>
<body>

<h1>Minesweeper</h1>

<div class="controls">
  <button onclick="startGame(9, 9, 10)" id="btn-easy">Easy (9x9)</button>
  <button onclick="startGame(16, 16, 40)" id="btn-medium">Medium (16x16)</button>
  <button onclick="startGame(16, 30, 99)" id="btn-hard">Hard (30x16)</button>
</div>

<div class="info-bar">
  Mines: <span id="mine-count">0</span>
  &nbsp;&nbsp;
  Time: <span id="timer">0</span>s
</div>

<div id="message"></div>
<div id="board"></div>

<script>
let rows, cols, totalMines;
let board;       // 2D array of cell data
let revealed;    // 2D array of booleans
let flagged;     // 2D array of booleans
let gameOver;
let firstClick;
let minesLeft;
let timerInterval;
let seconds;

function startGame(r, c, mines) {
  rows = r;
  cols = c;
  totalMines = mines;
  board = [];
  revealed = [];
  flagged = [];
  gameOver = false;
  firstClick = true;
  minesLeft = mines;
  seconds = 0;

  clearInterval(timerInterval);
  document.getElementById('timer').textContent = '0';
  document.getElementById('mine-count').textContent = minesLeft;
  document.getElementById('message').textContent = '';

  // Highlight active difficulty button
  document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
  if (r === 9) document.getElementById('btn-easy').classList.add('active');
  else if (mines === 40) document.getElementById('btn-medium').classList.add('active');
  else document.getElementById('btn-hard').classList.add('active');

  // Initialize empty board
  for (let i = 0; i < rows; i++) {
    board[i] = [];
    revealed[i] = [];
    flagged[i] = [];
    for (let j = 0; j < cols; j++) {
      board[i][j] = 0;
      revealed[i][j] = false;
      flagged[i][j] = false;
    }
  }

  renderBoard();
}

function placeMines(safeRow, safeCol) {
  // Keep a safe zone around the first click
  let placed = 0;
  while (placed < totalMines) {
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    if (board[r][c] === -1) continue;
    if (Math.abs(r - safeRow) <= 1 && Math.abs(c - safeCol) <= 1) continue;
    board[r][c] = -1;
    placed++;
  }

  // Calculate numbers
  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      if (board[i][j] === -1) continue;
      let count = 0;
      for (let di = -1; di <= 1; di++) {
        for (let dj = -1; dj <= 1; dj++) {
          const ni = i + di, nj = j + dj;
          if (ni >= 0 && ni < rows && nj >= 0 && nj < cols && board[ni][nj] === -1) {
            count++;
          }
        }
      }
      board[i][j] = count;
    }
  }
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.style.gridTemplateColumns = `repeat(${cols}, 36px)`;
  boardEl.innerHTML = '';

  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      const cell = document.createElement('div');
      cell.className = 'cell hidden';
      cell.dataset.row = i;
      cell.dataset.col = j;
      cell.addEventListener('click', () => handleClick(i, j));
      cell.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        handleRightClick(i, j);
      });
      boardEl.appendChild(cell);
    }
  }
}

function getCell(r, c) {
  return document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
}

function handleClick(r, c) {
  if (gameOver || flagged[r][c] || revealed[r][c]) return;

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById('timer').textContent = seconds;
    }, 1000);
  }

  if (board[r][c] === -1) {
    // Hit a mine — game over
    revealAll();
    gameOver = true;
    clearInterval(timerInterval);
    document.getElementById('message').textContent = 'Game Over! Click a difficulty to play again.';
    return;
  }

  reveal(r, c);
  checkWin();
}

function handleRightClick(r, c) {
  if (gameOver || revealed[r][c]) return;

  flagged[r][c] = !flagged[r][c];
  const cell = getCell(r, c);

  if (flagged[r][c]) {
    cell.textContent = '\u{1F6A9}';
    minesLeft--;
  } else {
    cell.textContent = '';
    minesLeft++;
  }

  document.getElementById('mine-count').textContent = minesLeft;
}

function reveal(r, c) {
  if (r < 0 || r >= rows || c < 0 || c >= cols) return;
  if (revealed[r][c] || flagged[r][c]) return;

  revealed[r][c] = true;
  const cell = getCell(r, c);
  cell.classList.remove('hidden');
  cell.classList.add('revealed');

  const val = board[r][c];
  if (val > 0) {
    const span = document.createElement('span');
    span.className = `n${val}`;
    span.textContent = val;
    cell.appendChild(span);
  } else if (val === 0) {
    // Flood fill for empty cells
    for (let di = -1; di <= 1; di++) {
      for (let dj = -1; dj <= 1; dj++) {
        reveal(r + di, c + dj);
      }
    }
  }
}

function revealAll() {
  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      const cell = getCell(i, j);
      if (board[i][j] === -1) {
        cell.classList.remove('hidden');
        cell.classList.add('mine');
        cell.textContent = '\u{1F4A3}';
      } else if (!revealed[i][j]) {
        revealed[i][j] = true;
        cell.classList.remove('hidden');
        cell.classList.add('revealed');
        if (board[i][j] > 0) {
          const span = document.createElement('span');
          span.className = `n${board[i][j]}`;
          span.textContent = board[i][j];
          cell.appendChild(span);
        }
      }
    }
  }
}

function checkWin() {
  let safeCount = 0;
  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      if (revealed[i][j]) safeCount++;
    }
  }
  if (safeCount === rows * cols - totalMines) {
    gameOver = true;
    clearInterval(timerInterval);
    document.getElementById('message').textContent =
      `You win! Completed in ${seconds}s`;
    // Flag remaining mines
    for (let i = 0; i < rows; i++) {
      for (let j = 0; j < cols; j++) {
        if (board[i][j] === -1 && !flagged[i][j]) {
          flagged[i][j] = true;
          getCell(i, j).textContent = '\u{1F6A9}';
        }
      }
    }
    document.getElementById('mine-count').textContent = 0;
  }
}

// Start with easy mode
startGame(9, 9, 10);
</script>
</body>
</html>
